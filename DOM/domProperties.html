<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <section>
        <div>
            <h1>innerHTML: Gets everything including HTML tags</h1>
        </div>
        <div><p>inner text: Gets only visible text from the element.It ignores hidden text. It respects CSS (display: none, visibility, etc.)
        </p></div>
        <div>
            <p>innerContent: Gets all text, including hidden text.</p>
        </div>
    </section>
</body>
</html>
